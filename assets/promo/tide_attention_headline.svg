<svg width="1200" height="640" viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#081020"/>
      <stop offset="1" stop-color="#220927"/>
    </linearGradient>
    <linearGradient id="tide" x1="0" x2="0" y1="0" y2="1">
      <stop stop-color="#54d6ff"/>
      <stop offset="1" stop-color="#2b8bff"/>
    </linearGradient>
    <linearGradient id="full" x1="0" x2="0" y1="0" y2="1">
      <stop stop-color="#9fb0c7"/>
      <stop offset="1" stop-color="#6b7a90"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="640" rx="32" fill="url(#bg)"/>
  <circle cx="270" cy="120" r="220" fill="#1b4fff" opacity="0.18"/>
  <circle cx="960" cy="470" r="240" fill="#ff33b8" opacity="0.15"/>
  <text x="70" y="92" fill="#f8fbff" font-family="Arial, sans-serif" font-size="46" font-weight="800">Tide Attention: hard_conflict accuracy</text>
  <text x="72" y="132" fill="#9fb0c7" font-family="Arial, sans-serif" font-size="24">Real Qwen2.5-0.5B, CPU. Stale memory hides the corrected answer behind deep retrieval.</text>

  <line x1="150" y1="500" x2="1130" y2="500" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
  <text x="96" y="230" fill="#9fb0c7" font-family="Arial, sans-serif" font-size="20">100%</text>
  <text x="104" y="365" fill="#9fb0c7" font-family="Arial, sans-serif" font-size="20">50%</text>
  <text x="112" y="505" fill="#9fb0c7" font-family="Arial, sans-serif" font-size="20">0%</text>

  <rect x="230" y="498" width="220" height="4" rx="2" fill="#ff5cc8"/>
  <text x="250" y="474" fill="#ff5cc8" font-family="Arial, sans-serif" font-size="60" font-weight="900">0%</text>
  <text x="250" y="540" fill="#f8fbff" font-family="Arial, sans-serif" font-size="26" font-weight="700">always_sparse</text>
  <text x="250" y="572" fill="#9fb0c7" font-family="Arial, sans-serif" font-size="20">cheap, misled by stale memory</text>

  <rect x="530" y="224" width="220" height="276" rx="10" fill="url(#full)"/>
  <text x="560" y="204" fill="#d7e2f2" font-family="Arial, sans-serif" font-size="46" font-weight="900">100%</text>
  <text x="560" y="540" fill="#f8fbff" font-family="Arial, sans-serif" font-size="26" font-weight="700">always_full</text>
  <text x="560" y="572" fill="#9fb0c7" font-family="Arial, sans-serif" font-size="20">correct, always full cost</text>

  <rect x="830" y="224" width="220" height="276" rx="10" fill="url(#tide)"/>
  <text x="860" y="204" fill="#54d6ff" font-family="Arial, sans-serif" font-size="46" font-weight="900">100%</text>
  <text x="860" y="540" fill="#f8fbff" font-family="Arial, sans-serif" font-size="26" font-weight="800">tide</text>
  <text x="860" y="572" fill="#7dffb2" font-family="Arial, sans-serif" font-size="20">correct, ~0.056x cost on clear memory</text>

  <text x="72" y="622" fill="#9fb0c7" font-family="Arial, sans-serif" font-size="19">54 real Qwen generations. Controlled demo, not a commercial-model comparison.</text>
</svg>
